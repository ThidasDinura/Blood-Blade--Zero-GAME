<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BLOOD BLADE: ZERO - MENU</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menu-main" class="ui-layer title-screen">
        <h1 class="game-title">BLOOD BLADE: ZERO</h1>
        <div class="menu-options">
            <button onclick="location.href='game.html'">NEW GAME</button>
            <button onclick="location.href='options.html'">OPTIONS</button>
            <button onclick="location.href='leaderboard-list.html'">LEADERBOARD</button>
            <button onclick="location.href='about.html'">ABOUT</button>
            
            <button id="nav-login" onclick="location.href='login.html'">LOGIN</button>
            <button id="nav-logout" class="hidden" onclick="game.logout()">LOGOUT</button>
        </div>
    </div>

    <div id="user-welcome" class="hidden" style="position: fixed; bottom: 20px; left: 20px; font-family: monospace; color: yellow; background: rgba(0,0,0,0.6); padding: 10px; border: 2px solid yellow; border-radius: 5px; z-index: 100;">
        <span id="welcome-text"></span>
    </div>

    <script src="game.js"></script>
    <script>
        // Use a small delay to ensure game object is fully ready
        window.addEventListener('load', () => {
            const savedUser = localStorage.getItem('gameUser');
            if (window.game) {
                game.updateAuthUI(savedUser);
            }
        });
    </script>
</body>
</html>
